name: ORACULO

on:
  schedule:
    - cron: "0 */12 * * *" # executa a cada 12h
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload_and_optimize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Ensure folders exist
        run: |
          mkdir -p videos/pending
          mkdir -p videos/posted
          mkdir -p data
          echo "✅ Pastas de vídeos verificadas/criadas."

      - name: Log Current Time
        run: |
          echo "🕐 Horário atual do servidor:"
          date
          echo "🕐 Horário UTC (para referência):"
          date -u

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests openai matplotlib

      # 1️⃣ Coletar métricas
      - name: Collect Metrics
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          YOUTUBE_OAUTH_JSON: ${{ secrets.YOUTUBE_OAUTH_JSON }}
          YOUTUBE_TOKEN_PICKLE: ${{ secrets.YOUTUBE_TOKEN_PICKLE }}
          TOKEN_PICKLE_COMPLETE: ${{ secrets.TOKEN_PICKLE_COMPLETE }}
          GRAPH_API_TOKEN: ${{ secrets.GRAPH_API_TOKEN }}
        run: python3 collect_metrics.py

      # 2️⃣ Analisar métricas e gerar próximo gancho/horário (salvando JSON do log)
      - name: Analyze Metrics
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEW_OPEN_AI_KEY: ${{ secrets.NEW_OPEN_AI_KEY }}
        run: |
          echo "📊 Iniciando análise..."
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

          OUTPUT=$(python3 analyze_metrics.py 2>&1)

          echo "$OUTPUT" | python3 - <<'EOF'
import sys, re, json, os, datetime

log = sys.stdin.read()
json_matches = re.findall(r'\{(?:[^{}]|(?R))*\}', log)
os.makedirs("data", exist_ok=True)

if json_matches:
    for i, j in enumerate(json_matches, start=1):
        try:
            data = json.loads(j)
            timestamp = datetime.datetime.now().strftime("%Y-%m-%d_%H-%M-%S")
            filename = f"data/log_analyze_{timestamp}_{i}.json"
            with open(filename, "w", encoding="utf-8") as f:
                json.dump(data, f, ensure_ascii=False, indent=2)
            print(f"✅ JSON salvo em {filename}")
        except json.JSONDecodeError:
            print(f"❌ JSON inválido ignorado ({i})")
else:
    print("⚠️ Nenhum JSON encontrado no log.")
EOF

          echo "✅ Análise concluída!"

      - name: Commit recomendações
        run: |
          git add data/recomendacoes.json
          git commit -m "Atualiza recomendações automáticas" || echo "Nada a commitar"
          git push

      - name: Atualizar cron dos workflows
        run: python3 update_cron.py

      - name: Commitar mudanças nos YAML
        env:
          GIT_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          git config --global user.name "ORACULO-BOT"
          git config --global user.email "actions@github.com"
          git add .github/workflows/*.yml
          git commit -m "🕒 Atualiza horários automáticos de postagem" || echo "Nenhuma alteração"
          git push https://x-access-token:${GIT_TOKEN}@github.com/${{ github.repository }} HEAD:${{ github.ref_name }}

      - name: Commitar mudanças nos YAML
        env:
          GIT_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/*.yml
          git commit -m "🕒 Atualiza horários automáticos de postagem" || echo "Nenhuma alteração"
          git push https://x-access-token:${GIT_TOKEN}@github.com/${{ github.repository }} HEAD:${{ github.ref_name }}

      # 5️⃣ Commit e push automáticos dos resultados
      - name: Commit Updated Metrics and State
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/metrics.json data/analise_ganchos.json data/state.json || true
          git add videos/posted || true
          git reset token.pickle client_secret.json || true
          git commit -m "📊 Atualiza métricas, análises e vídeos postados" || true
          git push || true
